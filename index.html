<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Schedule</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c6dfa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schedule">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26; --border: #2a2a3d;
    --accent: #7c6dfa; --accent2: #fa6d8a; --accent3: #6dfac0;
    --text: #e8e8f0; --muted: #6b6b8a;
    --tennis: #facc15; --study: #7c6dfa; --class: #6dfac0; --work: #fa8c6d; --break: #6db4fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 48px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 8vw, 96px); letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; }
  .day-tabs { display: flex; gap: 6px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  .day-tab {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.1em;
    padding: 10px 18px; border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .day-tab:hover { border-color: var(--accent); color: var(--text); }
  .day-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .day-tab .day-pct { display: block; font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.8; margin-top: 2px; }
  .day-view { display: none; }
  .day-view.active { display: block; }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.05em; color: var(--text); }
  .progress-section { display: flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 24px; flex-wrap: wrap; gap: 12px; }
  .progress-ring-wrap { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
  .progress-ring-wrap svg { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
  .progress-ring-fill { fill: none; stroke: var(--accent3); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1); }
  .progress-pct-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent3); }
  .progress-info h3 { font-size: 22px; font-weight: 600; color: var(--text); }
  .progress-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .progress-bar-wrap { flex: 1; min-width: 120px; }
  .progress-bar-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .reset-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .tasks { display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    display: flex; align-items: center; gap: 14px; padding: 14px 18px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; user-select: none;
  }
  .task-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--type-color, var(--muted)); border-radius: 3px 0 0 3px; }
  .task-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--muted); }
  .task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .task-item.done .task-check { background: var(--accent3); border-color: var(--accent3); }
  .task-check svg { opacity: 0; transition: opacity 0.2s; }
  .task-item.done .task-check svg { opacity: 1; }
  .task-content { flex: 1; }
  .task-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.05em; }
  .task-label { font-size: 14px; font-weight: 500; color: var(--text); transition: all 0.2s; }
  .task-badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 99px; font-weight: 500; letter-spacing: 0.05em; flex-shrink: 0; text-transform: uppercase; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .weekly-bar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .weekly-bar-day { text-align: center; cursor: pointer; }
  .weekly-bar-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
  .weekly-bar-track { height: 80px; background: var(--border); border-radius: 6px; overflow: hidden; display: flex; align-items: flex-end; }
  .weekly-bar-fill { width: 100%; background: linear-gradient(0deg, var(--accent), var(--accent3)); border-radius: 6px; transition: height 0.6s cubic-bezier(.4,0,.2,1); }
  .weekly-bar-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>WEEKLY SCHEDULE</h1>
    <p>Uni · Tennis · Work · Study — Track Your Day</p>
  </header>
  <div class="weekly-bar" id="weeklyBar"></div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--class)"></div>Class</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--study)"></div>Study</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tennis)"></div>Tennis</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--work)"></div>Work</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--break)"></div>Break/Other</div>
  </div>
  <div id="dayViews"></div>
</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const SCHEDULE = {
  // MONDAY: tennis 2-5 → 4-7pm, dinner extended to 2hrs, wind down removed
  Monday: [
    { time:'7:00–8:00 AM',      label:'Wake up, breakfast, prepare for day', type:'break' },
    { time:'8:00–11:00 AM',     label:'Study / Revision (3 hrs — focused uni material)', type:'study' },
    { time:'11:00 AM–12:00 PM', label:'Break / Lunch prep', type:'break' },
    { time:'12:00–1:00 PM',     label:'LQB180 TUT01 Online 🎓', type:'class' },
    { time:'1:00–4:00 PM',      label:'Study / Revision (3 hrs — deep review)', type:'study' },
    { time:'4:00–7:00 PM',      label:'Tennis Practice 🎾 (3 hrs)', type:'tennis' },
    { time:'7:00–9:00 PM',      label:'Dinner / Relax (2 hrs)', type:'break' },
    { time:'9:00–11:00 PM',     label:'Study / Revision (2 hrs — evening session)', type:'study' },
    { time:'11:00 PM',          label:'Sleep 💤', type:'break' },
  ],
  // TUESDAY: unchanged
  Tuesday: [
    { time:'7:00–8:00 AM',      label:'Wake up, breakfast, prepare for day', type:'break' },
    { time:'8:00 AM–12:00 PM',  label:'Study / Revision (4 hrs — intensive morning block)', type:'study' },
    { time:'12:00–1:00 PM',     label:'Lunch / Break', type:'break' },
    { time:'1:00–2:00 PM',      label:'LLB101 TUT01 Online 🎓', type:'class' },
    { time:'2:00–3:00 PM',      label:'Travel / Break to Gardens Point', type:'break' },
    { time:'3:00–5:00 PM',      label:'LQB180 PRC01 In-person @ Gardens Point 🎓', type:'class' },
    { time:'5:00–5:30 PM',      label:'Travel home / Break', type:'break' },
    { time:'5:30–8:00 PM',      label:'Tennis Practice 🎾 (2.5 hrs, evening)', type:'tennis' },
    { time:'8:00–9:00 PM',      label:'Dinner / Relax', type:'break' },
    { time:'9:00–11:00 PM',     label:'Study / Revision (2 hrs — lighter session)', type:'study' },
    { time:'11:00 PM',          label:'Sleep 💤', type:'break' },
  ],
  // WEDNESDAY: unchanged
  Wednesday: [
    { time:'7:00–8:00 AM',      label:'Wake up, breakfast, prepare for day', type:'break' },
    { time:'8:00–10:00 AM',     label:'LLB102 LEC01 Online 🎓', type:'class' },
    { time:'10:00–11:00 AM',    label:'LLB102 TUT01 Online 🎓', type:'class' },
    { time:'11:00 AM–12:00 PM', label:'Study / Revision (1 hr — quick review)', type:'study' },
    { time:'12:00–1:00 PM',     label:'Lunch / Break', type:'break' },
    { time:'1:00–4:00 PM',      label:'Work 💼 (⚠️ LLB101 LEC01 Online 2–3 PM overlaps — check recording)', type:'work' },
    { time:'4:00–5:00 PM',      label:'Break / Relax', type:'break' },
    { time:'5:00–8:00 PM',      label:'Tennis Practice 🎾 (3 hrs, evening)', type:'tennis' },
    { time:'8:00–9:00 PM',      label:'Dinner', type:'break' },
    { time:'9:00–11:00 PM',     label:'Study / Revision (2 hrs — weak areas)', type:'study' },
    { time:'11:00 PM',          label:'Sleep 💤', type:'break' },
  ],
  // THURSDAY: unchanged (morning tennis constrained by afternoon work/class)
  Thursday: [
    { time:'7:00–8:00 AM',      label:'Wake up, breakfast, prepare for day', type:'break' },
    { time:'8:00–9:00 AM',      label:'LQB182 WOR01 Online 🎓', type:'class' },
    { time:'9:00–11:30 AM',     label:'Tennis Fitness 🎾 (2.5 hrs — fitness-based morning)', type:'tennis' },
    { time:'11:30 AM–12:00 PM', label:'Break / Shower', type:'break' },
    { time:'12:00–1:00 PM',     label:'Study / Revision (1 hr)', type:'study' },
    { time:'1:00–4:00 PM',      label:'Work 💼 (⚠️ LLB101 LEC01 Online 2–3 PM overlaps; leave early for PRC if needed)', type:'work' },
    { time:'3:00–5:00 PM',      label:'LQB182 PRC01 In-person @ Kelvin Grove 🎓 (coordinate with work)', type:'class' },
    { time:'5:00–5:30 PM',      label:'Travel home / Break', type:'break' },
    { time:'5:30–6:30 PM',      label:'Dinner / Relax', type:'break' },
    { time:'6:30–10:30 PM',     label:'Study / Revision (4 hrs — extended evening)', type:'study' },
    { time:'10:30–11:00 PM',    label:'Wind down', type:'break' },
    { time:'11:00 PM',          label:'Sleep 💤', type:'break' },
  ],
  // FRIDAY: tennis 1-4 → 3-6pm, dinner extended to 2hrs, wind down removed
  Friday: [
    { time:'7:00–8:00 AM',     label:'Wake up, breakfast, prepare for day', type:'break' },
    { time:'8:00 AM–12:00 PM', label:'Study / Revision (4 hrs — morning focus)', type:'study' },
    { time:'12:00–1:00 PM',    label:'Lunch / Break', type:'break' },
    { time:'1:00–3:00 PM',     label:'Study / Revision (2 hrs — afternoon block)', type:'study' },
    { time:'3:00–6:00 PM',     label:'Tennis Practice 🎾 (3 hrs)', type:'tennis' },
    { time:'6:00–8:00 PM',     label:'Dinner / Relax (2 hrs)', type:'break' },
    { time:'8:00–11:00 PM',    label:'Study / Revision (3 hrs — deep weekly review)', type:'study' },
    { time:'11:00 PM',         label:'Sleep 💤', type:'break' },
  ],
  // SATURDAY: unchanged
  Saturday: [
    { time:'8:00–9:00 AM',     label:'Wake up later, breakfast', type:'break' },
    { time:'9:00 AM–12:00 PM', label:'Study / Revision (3 hrs — review past week)', type:'study' },
    { time:'12:00–1:00 PM',    label:'Lunch / Break', type:'break' },
    { time:'1:00–3:30 PM',     label:'Tennis Practice 🎾 (2.5 hrs, afternoon)', type:'tennis' },
    { time:'3:30–5:00 PM',     label:'Relax / Personal time', type:'break' },
    { time:'5:00–8:00 PM',     label:'Study / Revision (3 hrs — prep for upcoming week)', type:'study' },
    { time:'8:00–11:00 PM',    label:'Dinner, leisure, wind down', type:'break' },
    { time:'11:00 PM',         label:'Sleep 💤', type:'break' },
  ],
  // SUNDAY: unchanged
  Sunday: [
    { time:'8:00–9:00 AM',     label:'Wake up, breakfast', type:'break' },
    { time:'9:00–11:00 AM',    label:'Light Study / Revision (2 hrs — planning & light review)', type:'study' },
    { time:'11:00 AM–12:00 PM',label:'Break', type:'break' },
    { time:'12:00–3:00 PM',    label:'Tennis Practice 🎾 (3 hrs, afternoon)', type:'tennis' },
    { time:'3:00–5:00 PM',     label:'Relax / Personal time', type:'break' },
    { time:'5:00–8:00 PM',     label:'Study / Revision (3 hrs — targeted weak subjects)', type:'study' },
    { time:'8:00–11:00 PM',    label:'Dinner, prepare for week, wind down', type:'break' },
    { time:'11:00 PM',         label:'Sleep 💤', type:'break' },
  ],
};

const TYPE_COLORS   = { class:'var(--class)', study:'var(--study)', tennis:'var(--tennis)', work:'var(--work)', break:'var(--break)' };
const TYPE_BADGE_BG = { class:'rgba(109,250,192,0.15)', study:'rgba(124,109,250,0.15)', tennis:'rgba(250,204,21,0.15)', work:'rgba(250,140,109,0.15)', break:'rgba(109,180,250,0.15)' };

function loadState() { try { return JSON.parse(localStorage.getItem('schedState3')||'{}'); } catch(e){ return {}; } }
function saveState(s) { localStorage.setItem('schedState3', JSON.stringify(s)); }

let state = loadState();

function getPct(day) {
  const t = SCHEDULE[day], done = t.filter((_,i) => state[day+'_'+i]).length;
  return Math.round(done/t.length*100);
}
function getCountText(day) {
  const t = SCHEDULE[day], done = t.filter((_,i) => state[day+'_'+i]).length;
  return `${done} / ${t.length} tasks`;
}

const tabsEl   = document.getElementById('dayTabs');
const viewsEl  = document.getElementById('dayViews');
const wBarEl   = document.getElementById('weeklyBar');

DAYS.forEach((day, di) => {
  // Weekly bar col
  const col = document.createElement('div');
  col.className = 'weekly-bar-day';
  col.innerHTML = `<div class="weekly-bar-label">${day.slice(0,3).toUpperCase()}</div>
    <div class="weekly-bar-track"><div class="weekly-bar-fill" id="wbf-${di}" style="height:0%"></div></div>
    <div class="weekly-bar-pct" id="wbp-${di}">0%</div>`;
  col.addEventListener('click', () => switchDay(di));
  wBarEl.appendChild(col);

  // Tab
  const tab = document.createElement('button');
  tab.className = 'day-tab'+(di===0?' active':'');
  tab.id = `tab-${di}`;
  tab.innerHTML = `${day}<span class="day-pct" id="tabpct-${di}">0%</span>`;
  tab.addEventListener('click', () => switchDay(di));
  tabsEl.appendChild(tab);

  // View
  const view = document.createElement('div');
  view.className = 'day-view'+(di===0?' active':'');
  view.id = `view-${di}`;
  const tasks = SCHEDULE[day];
  view.innerHTML = `
    <div class="day-header">
      <div class="day-title">${day.toUpperCase()}</div>
      <div class="progress-section">
        <div class="progress-ring-wrap">
          <svg width="70" height="70" viewBox="0 0 70 70">
            <circle class="progress-ring-bg" cx="35" cy="35" r="28"/>
            <circle class="progress-ring-fill" id="ring-${di}" cx="35" cy="35" r="28"
              stroke-dasharray="${2*Math.PI*28}" stroke-dashoffset="${2*Math.PI*28}"/>
          </svg>
          <div class="progress-pct-text" id="ringtxt-${di}">0%</div>
        </div>
        <div class="progress-info">
          <h3 id="count-${di}">0 / ${tasks.length} tasks</h3>
          <p>daily completion</p>
          <div class="progress-bar-wrap" style="margin-top:8px;">
            <div class="progress-bar-track"><div class="progress-bar-fill" id="bar-${di}" style="width:0%"></div></div>
          </div>
        </div>
        <button class="reset-btn" onclick="resetDay(${di})">Reset</button>
      </div>
    </div>
    <div class="tasks">
      ${tasks.map((t,i) => `
        <div class="task-item${state[day+'_'+i]?' done':''}" id="task-${di}-${i}"
          style="--type-color:${TYPE_COLORS[t.type]}" onclick="toggleTask(${di},${i})">
          <div class="task-check">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <polyline points="2,7 5,10 11,3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="task-content">
            <div class="task-time">${t.time}</div>
            <div class="task-label">${t.label}</div>
          </div>
          <span class="task-badge" style="background:${TYPE_BADGE_BG[t.type]};color:${TYPE_COLORS[t.type]}">${t.type}</span>
        </div>`).join('')}
    </div>`;
  viewsEl.appendChild(view);
});

function updateUI(di) {
  const day = DAYS[di], pct = getPct(day), circ = 2*Math.PI*28;
  const ring = document.getElementById(`ring-${di}`);
  if(ring) ring.style.strokeDashoffset = circ-(pct/100)*circ;
  const rt = document.getElementById(`ringtxt-${di}`); if(rt) rt.textContent = pct+'%';
  const bar = document.getElementById(`bar-${di}`); if(bar) bar.style.width = pct+'%';
  const cnt = document.getElementById(`count-${di}`); if(cnt) cnt.textContent = getCountText(day);
  const tp = document.getElementById(`tabpct-${di}`); if(tp) tp.textContent = pct+'%';
  const wbf = document.getElementById(`wbf-${di}`); if(wbf) wbf.style.height = pct+'%';
  const wbp = document.getElementById(`wbp-${di}`); if(wbp) wbp.textContent = pct+'%';
}

function toggleTask(di, i) {
  const key = DAYS[di]+'_'+i;
  state[key] = !state[key];
  saveState(state);
  document.getElementById(`task-${di}-${i}`)?.classList.toggle('done', state[key]);
  updateUI(di);
}

function resetDay(di) {
  const day = DAYS[di];
  SCHEDULE[day].forEach((_,i) => {
    state[day+'_'+i] = false;
    document.getElementById(`task-${di}-${i}`)?.classList.remove('done');
  });
  saveState(state);
  updateUI(di);
}

function switchDay(di) {
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===di));
  document.querySelectorAll('.day-view').forEach((v,i) => v.classList.toggle('active', i===di));
}

DAYS.forEach((_,di) => updateUI(di));

// Register service worker for PWA/offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
